{% extends "base.html" %}
{% block title %}Вход · YouClone{% endblock %}
{% block content %}
<div class="form-card">
  <h1>Вход</h1>
  <form method="post" class="stack">
    <label>Логин или email
      <input type="text" name="login" required />
    </label>
    <label>Пароль
      <input type="password" name="password" required />
    </label>
    <button type="submit">Войти</button>
  </form>
</div>
{% endblock %}
