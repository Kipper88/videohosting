{% extends "base.html" %}
{% block title %}Загрузка видео · YouClone{% endblock %}
{% block content %}
<div class="form-card">
  <h1>Загрузка видео</h1>

  <div class="upload-preview-wrap" aria-live="polite">
    <div class="upload-preview-placeholder">Выберите файл, чтобы увидеть предпросмотр</div>
    <video id="upload-preview-video" class="upload-preview-video" controls preload="metadata"></video>
  </div>

  <form method="post" enctype="multipart/form-data" class="stack">
    <label>Название
      <input type="text" name="title" required maxlength="255" placeholder="Название ролика" />
    </label>

    <label>Описание
      <textarea name="description" rows="5" placeholder="О чем это видео"></textarea>
    </label>

    <label>Файл
      <input type="file" name="file" accept="video/mp4,video/webm,video/ogg,video/quicktime" required />
    </label>

    <button type="submit">Опубликовать</button>
  </form>
</div>
{% endblock %}
