{% extends "base.html" %} {% block title %}Загрузить видео · Видеохостинг{%
endblock %} {% block head %} {{ super() }}
<style>
	body {
		font-family: "Roboto", sans-serif;
		background-color: #f4f4f4;
		color: #333;
		margin: 0;
		padding: 0;
	}

	.container {
		max-width: 1200px;
		margin: 0 auto;
		padding: 20px 0;
	}

	.row {
		display: flex;
		flex-wrap: wrap;
		margin: 0 -15px;
	}

	.col-md-6 {
		flex: 0 0 50%;
		max-width: 50%;
		padding: 0 15px;
	}

	.card {
		border-radius: 5px;
		box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
		overflow: hidden;
		background-color: #fff;
	}

	.card-header {
		padding: 1rem 1.25rem;
		background-color: #000;
		color: #fff;
		border-bottom: none;
	}

	.card-body {
		padding: 1.25rem;
	}

	.form-group {
		margin-bottom: 1.25rem;
	}

	.form-control {
		display: block;
		width: 100%;
		padding: 0.75rem 1rem;
		margin-bottom: 0.25rem;
		font-size: 1rem;
		line-height: 1.5;
		color: #495057;
		background-color: #fff;
		background-clip: padding-box;
		border: 1px solid #ced4da;
		border-radius: 0.25rem;
		transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
	}

	.form-control-file {
		display: block;
		width: 100%;
		padding: 0.75rem 1rem;
		margin-bottom: 0.25rem;
		font-size: 1rem;
		line-height: 1.5;
		color: #495057;
		background-color: #fff;
		background-clip: padding-box;
		border: 1px solid #ced4da;
		border-radius: 0.25rem;
		transition: border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
	}

	.btn {
		display: inline-block;
		font-weight: 400;
		color: #fff;
		text-align: center;
		vertical-align: middle;
		user-select: none;
		background-color: #000;
		border: 1px solid transparent;
		padding: 0.375rem 0.75rem;
		font-size: 1rem;
		line-height: 1.5;
		border-radius: 0.25rem;
		transition: color 0.15s ease-in-out, background-color 0.15s ease-in-out,
			border-color 0.15s ease-in-out, box-shadow 0.15s ease-in-out;
	}

	.btn-primary {
		background-color: #000;
		border-color: #000;
	}

	.btn-primary:hover {
		background-color: #000;
		border-color: #000;
	}

	.btn-secondary {
		background-color: #ccc;
		border-color: #ccc;
	}

	.btn-secondary:hover {
		background-color: #bbb;
		border-color: #bbb;
	}
</style>
{% endblock %} {% block content %}
<div class="container">
	<div class="row justify-content-center">
		<div class="col-md-6">
			<div class="card">
				<h1 class="card-header">Загрузить видео</h1>
				<div class="card-body">
					<p class="card-text">
						Выберите видеоролик и введите название. Поддерживаются форматы mp4,
						webm, ogg, mov.
					</p>
					<form method="post" enctype="multipart/form-data" class="mt-3">
						<div class="form-group">
							<label for="title">Название</label>
							<input
								type="text"
								id="title"
								name="title"
								class="form-control"
								required
								placeholder="Например: мой первый ролик"
							/>
						</div>
						<div class="form-group">
							<label for="file">Видео файл</label>
							<input
								type="file"
								id="file"
								name="file"
								class="form-control-file"
								accept="video/mp4,video/webm,video/ogg,video/quicktime"
								required
							/>
						</div>
						<button type="submit" class="btn btn-primary">Загрузить</button>
						<a href="{{ url_for('main.index') }}" class="btn btn-secondary ml-2"
							>Отмена</a
						>
					</form>
				</div>
			</div>
		</div>
	</div>
</div>
{% endblock %}
